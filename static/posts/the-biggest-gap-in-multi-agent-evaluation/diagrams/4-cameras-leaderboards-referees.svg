<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="320" fill="#ffffff"/>

  <text x="380" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Cameras, Leaderboards — but no Referee</text>

  <!-- 1. Camera / Observability -->
  <g transform="translate(130,140)">
    <rect x="-44" y="-22" width="88" height="56" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <rect x="-14" y="-32" width="28" height="14" rx="4" fill="#16a34a"/>
    <circle cx="0" cy="6" r="16" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <circle cx="0" cy="6" r="7" fill="#16a34a"/>
  </g>
  <text x="130" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Observability</text>
  <text x="130" y="232" text-anchor="middle" font-size="12.5" fill="#64748b">Captures what happened</text>
  <rect x="78" y="248" width="104" height="28" rx="14" fill="#dcfce7"/>
  <text x="130" y="267" text-anchor="middle" font-size="12.5" font-weight="600" fill="#15803d">✓ Built</text>

  <!-- 2. Leaderboard / Benchmarks -->
  <g transform="translate(380,140)">
    <rect x="-30" y="-2" width="20" height="36" rx="3" fill="#fbbf24"/>
    <rect x="-8" y="-26" width="20" height="60" rx="3" fill="#d97706"/>
    <rect x="14" y="12" width="20" height="22" rx="3" fill="#fcd34d"/>
  </g>
  <text x="380" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Benchmarks</text>
  <text x="380" y="232" text-anchor="middle" font-size="12.5" fill="#64748b">Ranks the outcome</text>
  <rect x="328" y="248" width="104" height="28" rx="14" fill="#fef3c7"/>
  <text x="380" y="267" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b45309">✓ Built</text>

  <!-- 3. Referee / Evaluation (missing) -->
  <g transform="translate(630,140)">
    <!-- balance scale, drawn dashed/grey to signal 'missing' -->
    <g stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="5 4">
      <line x1="0" y1="-30" x2="0" y2="28"/>
      <line x1="-34" y1="-22" x2="34" y2="-22"/>
      <path d="M-34 -22 L-46 4 L-22 4 Z"/>
      <path d="M34 -22 L22 4 L46 4 Z"/>
      <line x1="-16" y1="28" x2="16" y2="28"/>
    </g>
    <circle cx="0" cy="-30" r="3.5" fill="#dc2626"/>
  </g>
  <text x="630" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Evaluation</text>
  <text x="630" y="232" text-anchor="middle" font-size="12.5" fill="#64748b">Judges the behavior</text>
  <rect x="578" y="248" width="104" height="28" rx="14" fill="#fee2e2"/>
  <text x="630" y="267" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">✗ Missing</text>

  <text x="380" y="302" text-anchor="middle" font-size="12.5" fill="#94a3b8">We built cameras and leaderboards. We never built the referee.</text>
</svg>
