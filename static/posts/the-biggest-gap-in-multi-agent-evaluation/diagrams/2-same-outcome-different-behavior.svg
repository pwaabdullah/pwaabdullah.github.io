<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="760" height="330" fill="#ffffff"/>

  <text x="380" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Same Outcome. Different Behavior.</text>
  <text x="380" y="68" text-anchor="middle" font-size="14" fill="#64748b">The benchmark logs the same score for both.</text>

  <!-- Agent A -->
  <text x="36" y="128" font-size="16" font-weight="700" fill="#0f172a">Agent A</text>
  <text x="36" y="148" font-size="12" fill="#64748b">1 tool call · 10s</text>
  <line x1="150" y1="125" x2="540" y2="125" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="150" y1="125" x2="540" y2="125" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <circle cx="220" cy="125" r="9" fill="#16a34a"/>
  <text x="220" y="103" text-anchor="middle" font-size="11" fill="#15803d">book</text>
  <rect x="560" y="103" width="170" height="44" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="645" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">✓ Success = True</text>

  <!-- Agent B -->
  <text x="36" y="245" font-size="16" font-weight="700" fill="#0f172a">Agent B</text>
  <text x="36" y="265" font-size="12" fill="#64748b">42 calls · 3 fails · 1 cancel</text>
  <line x1="150" y1="242" x2="540" y2="242" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="150" y1="242" x2="540" y2="242" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <!-- green steps -->
  <circle cx="172" cy="242" r="8" fill="#16a34a"/>
  <circle cx="212" cy="242" r="8" fill="#16a34a"/>
  <!-- red fail -->
  <g stroke="#dc2626" stroke-width="2.5"><line x1="248" y1="238" x2="256" y2="246"/><line x1="256" y1="238" x2="248" y2="246"/></g>
  <g stroke="#dc2626" stroke-width="2.5"><line x1="288" y1="238" x2="296" y2="246"/><line x1="296" y1="238" x2="288" y2="246"/></g>
  <circle cx="332" cy="242" r="8" fill="#16a34a"/>
  <g stroke="#dc2626" stroke-width="2.5"><line x1="368" y1="238" x2="376" y2="246"/><line x1="376" y1="238" x2="368" y2="246"/></g>
  <circle cx="412" cy="242" r="8" fill="#16a34a"/>
  <circle cx="452" cy="242" r="8" fill="#16a34a"/>
  <circle cx="492" cy="242" r="8" fill="#16a34a"/>
  <text x="290" y="218" text-anchor="middle" font-size="11" fill="#b91c1c">retries · wrong searches · a cancel</text>
  <rect x="560" y="220" width="170" height="44" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="645" y="247" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">✓ Success = True</text>

  <text x="380" y="308" text-anchor="middle" font-size="12.5" fill="#94a3b8">One is reliable. One is fragile. The score can't tell them apart.</text>
</svg>
