<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="tvo" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="380" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Grade the Outcome, Not the Transcript</text>
  <text x="380" y="66" text-anchor="middle" font-size="13.5" fill="#64748b">Assert on the final state of the world, not the words the agent emits.</text>

  <!-- Step 1 -->
  <rect x="40" y="110" width="200" height="84" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="140" y="142" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" fill="#0f172a">setup_environment()</text>
  <text x="140" y="166" text-anchor="middle" font-size="11.5" fill="#475569">Real or sandboxed env</text>
  <text x="140" y="182" text-anchor="middle" font-size="11.5" fill="#475569">(e.g. empty SQL database)</text>
  <path d="M242 152 L278 152" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#tvo)"/>

  <!-- Step 2 -->
  <rect x="280" y="110" width="200" height="84" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="380" y="142" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" fill="#0f172a">run_agent()</text>
  <text x="380" y="166" text-anchor="middle" font-size="11.5" fill="#475569">Agent acts and emits</text>
  <text x="380" y="182" text-anchor="middle" font-size="11.5" fill="#475569">a transcript</text>
  <path d="M482 152 L518 152" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#tvo)"/>

  <!-- Step 3 -->
  <rect x="520" y="110" width="200" height="84" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="620" y="142" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" fill="#15803d">assert_state()</text>
  <text x="620" y="166" text-anchor="middle" font-size="11.5" fill="#475569">Did the reservation</text>
  <text x="620" y="182" text-anchor="middle" font-size="11.5" fill="#475569">actually land in the DB?</text>

  <!-- contrast row -->
  <g transform="translate(0,232)">
    <rect x="280" y="0" width="200" height="34" rx="17" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="380" y="22" text-anchor="middle" font-size="12" fill="#b91c1c">transcript: "Flight booked"</text>
    <line x1="300" y1="17" x2="460" y2="17" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="520" y="0" width="200" height="34" rx="17" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="620" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">state: reservation exists ✓</text>
  </g>
  <text x="160" y="254" text-anchor="middle" font-size="12.5" fill="#94a3b8">What it says</text>
  <text x="160" y="272" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">≠ what it did</text>
</svg>
