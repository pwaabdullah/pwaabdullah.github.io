<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The Three-Layer Picture</text>
  <text x="360" y="66" text-anchor="middle" font-size="13.5" fill="#64748b">Two layers are built. The middle one is the gap.</text>

  <!-- Layer A: Observability -->
  <rect x="60" y="86" width="600" height="64" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="88" y="114" font-size="16" font-weight="700" fill="#0f172a">A · Observability</text>
  <text x="88" y="135" font-size="12.5" fill="#475569">What happened? Capturing the trace.</text>
  <rect x="524" y="103" width="112" height="30" rx="15" fill="#dcfce7"/>
  <text x="580" y="123" text-anchor="middle" font-size="12.5" font-weight="600" fill="#15803d">Solved</text>

  <!-- Layer C: Evaluation (the gap) -->
  <rect x="60" y="160" width="600" height="64" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="88" y="188" font-size="16" font-weight="700" fill="#0f172a">C · Evaluation</text>
  <text x="88" y="209" font-size="12.5" fill="#475569">How well did it behave? Grading the trace.</text>
  <rect x="524" y="177" width="112" height="30" rx="15" fill="#fee2e2"/>
  <text x="580" y="197" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">The Gap</text>

  <!-- Layer B: Benchmarks -->
  <rect x="60" y="234" width="600" height="64" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="88" y="262" font-size="16" font-weight="700" fill="#0f172a">B · Benchmarks</text>
  <text x="88" y="283" font-size="12.5" fill="#475569">Did it succeed? Scoring the outcome.</text>
  <rect x="524" y="251" width="112" height="30" rx="15" fill="#fef3c7"/>
  <text x="580" y="271" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b45309">Largely solved</text>

  <text x="360" y="332" text-anchor="middle" font-size="12.5" fill="#94a3b8">The two outer layers are built. The middle one, grading how the agent behaved, is missing.</text>
</svg>
