<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="mft" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">The Evaluation Unit</text>
  <text x="360" y="66" text-anchor="middle" font-size="13.5" fill="#64748b">Framework is a variable, not a constant.</text>

  <!-- LEFT: the usual flat grid -->
  <text x="170" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">The usual unit</text>
  <g stroke="#cbd5e1" stroke-width="1.5" fill="#f1f5f9">
    <rect x="110" y="140" width="55" height="55"/>
    <rect x="165" y="140" width="55" height="55"/>
    <rect x="110" y="195" width="55" height="55"/>
    <rect x="165" y="195" width="55" height="55"/>
  </g>
  <text x="165" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Model × Task</text>

  <!-- arrow -->
  <path d="M250 200 L320 200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#mft)"/>

  <!-- RIGHT: the cube -->
  <text x="540" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">The real unit</text>
  <!-- top face -->
  <polygon points="470,150 570,150 610,118 510,118" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- side face -->
  <polygon points="570,150 610,118 610,218 570,250" fill="#a5b4fc" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- front face -->
  <rect x="470" y="150" width="100" height="100" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- axis labels -->
  <text x="455" y="205" text-anchor="end" font-size="12" font-weight="600" fill="#3730a3">Model</text>
  <text x="520" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">Task</text>
  <text x="618" y="170" font-size="12" font-weight="600" fill="#3730a3">Framework</text>
  <text x="540" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Model × Framework × Task</text>

  <text x="360" y="340" text-anchor="middle" font-size="12.5" fill="#94a3b8">Framework choice moves the score as much as model choice (MASEval).</text>
</svg>
