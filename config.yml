# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://www.newabdullah.com/"
title: Abdullah Al Mamun
copyright: "© newabdullah 2025"
theme: ["PaperMod"]
pagination.pagerSize: 5

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  # minifyOutput: true

languages:
  en:
    label: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Blog
          url: archives
          weight: 4
        - name: About
          url: about
          weight: 5
        - name: Resume
          url: resume
          weight: 6
        - name: Linkedin
          url: https://www.linkedin.com/in/newabdullah/
          weight: 7
          pre: "<i class='fab fa-linkedin'></i>"
          params:
            target: "_blank"
        - name: Contact
          url: contact
          weight: 8
        - name: Search
          url: search/
          weight: 9

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema
  description: "Abdullah Al Mamun, PhD — Sr. ML Engineer at Atlassian (Central AI). Ex-Meta Ads ML. Writing on RecSys, agentic AI, RL fine-tuning, and LLMs."
  keywords:
    - "Abdullah Al Mamun"
    - "Sr. ML Engineer"
    - "Atlassian"
    - "Meta"
    - "Recommendation Systems"
    - "RecSys"
    - "Agentic AI"
    - "Large Language Models"
    - "LLM Fine-tuning"
    - "Reinforcement Learning"
    - "Machine Learning"
    - "Applied AI"
  author: "Abdullah Al Mamun"

  # Default Open Graph / Twitter card image (1200x630). Used on every page
  # where no per-page cover image is set. PaperMod's opengraph.html and
  # twitter_cards.html pick this up automatically from site.Params.images.
  images:
    - "og-default.png"

  # Person schema (vs default Organization) for JSON-LD on the home page.
  # Lets Google's knowledge graph treat this as a person entity.
  # `image` here is read by our schema_json.html override so the Person
  # image is the real headshot, not the tiny favicon.
  schema:
    publisherType: "Person"
    image: "/headshot.jpg"
    sameAs:
      - "https://www.linkedin.com/in/newabdullah/"
      - "https://github.com/pwaabdullah"
      - "https://scholar.google.com/citations?user=iMIqKjcAAAAJ"
      - "https://x.com/newmamun"

  # Social handle for twitter:site / twitter:creator meta.
  social:
    twitter: "newmamun"

  # Used by the custom post-footer widgets (layouts/_partials/extend_post_content.html)
  buyMeACoffee: "https://buymeacoffee.com/aamcseg"
  followItFormAction: "https://api.follow.it/subscription-form/OUlKb0NES0htNnRmZmRMSVVacGFRdkY5MW84UUQwL1ZGK2F2S0k0c3duS0EwaU1iN3V6VzQ0YXgyMjNwbGdoWEFYWGhCYlRKVGZ4bGdqdDVWVVJnVk00WVF5OWZxckRJQWdWai9LRytFYzBiQlhnbGhZZnVtOGtqeW55UUZBRDF8U0JBNGMrbDZPVk8wVm1EWUkxeUlEZFMwNnlhek1OZWtlajNEMldZaGpUcz0=/21"

  defaultTheme: auto
  # disableThemeToggle: true
  # Custom share buttons are rendered by extend_footer.html — disable PaperMod's
  # built-in ones so we don't double up.
  ShowShareButtons: false
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: true
  math: true

  profileMode:
    enabled: false
    title: PaperMod
    imageUrl: "#"
    imageTitle: my image
    buttons:
      - name: Blog
        url: archives
      - name: Tags
        url: tags

  homeInfoParams:
    Title: "I'm Abdullah!"
    Content: >
      **Sr. ML Engineer at Atlassian | Ex-Meta**

  # socialIcons intentionally empty — header has the LinkedIn menu item already,
  # and the per-post share row lives in extend_footer.html.

  assets:
    disableHLJS: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
