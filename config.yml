# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://www.newabdullah.com/"
title: Abdullah Al Mamun
copyright: "© newabdullah 2025"
theme: ["PaperMod"]
pagination.pagerSize: 5

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  # minifyOutput: true

languages:
  en:
    label: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Blog
          url: archives
          weight: 4
        - name: About Me
          url: about
          weight: 5
        - name: Resume
          url: https://www.newabdullah.com/Abdullah_Resume.pdf
          weight: 6
          params:
            target: "_blank"
        - name: Linkedin
          url: https://www.linkedin.com/in/newabdullah/
          weight: 7
          pre: "<i class='fab fa-linkedin'></i>"
          params:
            target: "_blank"
        # - name: Gallery
        #   url: gallery/
        #   weight: 8
        - name: Contact
          url: contact
          weight: 9
        - name: Search
          url: search/
          weight: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema
  description: "Abdullah Al Mamun — LLM Architect, Ex-Meta. Blog on RecSys, LLMs, and Agentic AI."
  author: "Abdullah Al Mamun"

  # Used by the custom post-footer widgets (layouts/partials/extend_footer.html)
  buyMeACoffee: "https://buymeacoffee.com/aamcseg"
  followItFormAction: "https://api.follow.it/subscription-form/OUlKb0NES0htNnRmZmRMSVVacGFRdkY5MW84UUQwL1ZGK2F2S0k0c3duS0EwaU1iN3V6VzQ0YXgyMjNwbGdoWEFYWGhCYlRKVGZ4bGdqdDVWVVJnVk00WVF5OWZxckRJQWdWai9LRytFYzBiQlhnbGhZZnVtOGtqeW55UUZBRDF8U0JBNGMrbDZPVk8wVm1EWUkxeUlEZFMwNnlhek1OZWtlajNEMldZaGpUcz0=/21"

  defaultTheme: auto
  # disableThemeToggle: true
  # Custom share buttons are rendered by extend_footer.html — disable PaperMod's
  # built-in ones so we don't double up.
  ShowShareButtons: false
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: true
  math: true

  profileMode:
    enabled: false
    title: PaperMod
    imageUrl: "#"
    imageTitle: my image
    buttons:
      - name: Blog
        url: archives
      - name: Tags
        url: tags

  homeInfoParams:
    Title: "I'm Abdullah!"
    Content: >
      **LLM Architect | Ex-Meta**

  # socialIcons intentionally empty — header has the LinkedIn menu item already,
  # and the per-post share row lives in extend_footer.html.

  assets:
    disableHLJS: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
